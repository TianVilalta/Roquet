<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Sales - Quest 3</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
    color: white;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    text-align: center;
    padding: 20px;
    pointer-events: none;
  }
  #status { margin-top: 10px; font-size: 14px; color: #aaa; }
  #controllerInfo {
    position: absolute;
    top: 10px; left: 10px;
    font-size: 12px;
    line-height: 1.6;
    background: rgba(0,0,0,0.55);
    padding: 8px 14px;
    border-radius: 8px;
    pointer-events: none;
    white-space: pre;
  }
  #hud {
    position: absolute;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    width: 280px;
    background: rgba(0, 0, 0, 0.72);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 18px;
    padding: 10px 12px;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    color: #fff;
    font-size: 12px;
    z-index: 10;
  }
  #hudLogo {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }
  #hudBody {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #hudBody span { display: block; }
  #hudButtons {
    display: flex;
    gap: 6px;
    justify-content: space-between;
  }
  .hudButton {
    display: inline-flex;
    width: 38px;
    height: 28px;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    font-weight: bold;
  }
  #hudIcon {
    width: 56px;
    height: 34px;
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 22px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
  }
  .controllerBtn {
    display: inline-flex;
    width: 16px;
    height: 16px;
    margin: 0 2px;
    border-radius: 50%;
    background: #ffffff;
    color: #111111;
    font-size: 10px;
    font-weight: bold;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(0,0,0,0.15);
  }
  canvas { display: block; }
</style>
</head>
<body>
<div id="overlay">
  <h2>Sales VR — Quest 3</h2>
  <div id="status">Carregant...</div>
</div>
<div id="controllerInfo">Mandos: esperant sessió VR...</div>
<div id="hud">
  <img id="hudLogo" src="roquet.png" alt="Roquet logo" />
  <div id="hudIcon">
    <span class="controllerBtn">A</span>
    <span class="controllerBtn">B</span>
  </div>
  <div id="hudBody">
    <span style="font-weight:bold;">Meta Quest 3</span>
    <span>A: entra a la sala de la imatge</span>
    <span>B: torna enrere</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script>
  window.addEventListener('error', e => {
    const s = document.getElementById('status');
    if (s) { s.textContent = 'Error: ' + (e.message || e); s.style.color = '#f66'; }
  });
  window.addEventListener('unhandledrejection', e => {
    const s = document.getElementById('status');
    if (s) { s.textContent = 'Error: ' + (e.reason?.message ?? e.reason); s.style.color = '#f66'; }
  });
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// ─── RENDER ────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);

// Llum global
scene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(2, 5, 3);
scene.add(dirLight);

// ─── TEMES ────────────────────────────────────────────────────────────
const themes = [
  { label: 'Dinacil',      color: 0xe63946, wallColor: 0x888888 },
  { label: 'Hidràulics',   color: 0x2dc653, wallColor: 0x888888 },
  { label: 'Bombes',       color: 0x4895ef, wallColor: 0x888888 },
  { label: 'Cilindres',    color: 0xf4a261, wallColor: 0x888888 },
  { label: 'Ploiesti',     color: 0x8d67ff, wallColor: 0x888888 },
  { label: 'Fundició',     color: 0xffa500, wallColor: 0x888888 },
];

// ─── TEXTURA DIFUMINADA DEL INTERIOR DE CADA SALA ─────────────────────
// Dibuixem una perspectiva senzilla d'una sala sobre un canvas i la difuminem
function makeRoomPreviewTexture(theme) {
  const S = 256;
  // Canvas de dibuix sense blur
  const off = document.createElement('canvas');
  off.width = S; off.height = S;
  const oc = off.getContext('2d');

  const themeColor = '#' + new THREE.Color(theme.color).getHexString();

  // Fons / paret del fons: color accent del tema clar
  oc.fillStyle = '#aaaaaa';
  oc.fillRect(0, 0, S, S);

  // Perspectiva: punt de fuga al centre
  const cx = S * 0.5, cy = S * 0.48;
  const margin = S * 0.22;

  // Paret esquerra
  oc.fillStyle = '#999999';
  oc.beginPath();
  oc.moveTo(0, 0); oc.lineTo(cx, cy);
  oc.lineTo(cx, S); oc.lineTo(0, S);
  oc.closePath(); oc.fill();

  // Paret dreta
  oc.fillStyle = '#777777';
  oc.beginPath();
  oc.moveTo(S, 0); oc.lineTo(cx, cy);
  oc.lineTo(cx, S); oc.lineTo(S, S);
  oc.closePath(); oc.fill();

  // Terra negre
  oc.fillStyle = '#111111';
  oc.beginPath();
  oc.moveTo(0, S); oc.lineTo(cx, S * 0.72);
  oc.lineTo(S, S);
  oc.closePath(); oc.fill();

  // Sostre fosc
  oc.fillStyle = '#333333';
  oc.beginPath();
  oc.moveTo(0, 0); oc.lineTo(cx, S * 0.22);
  oc.lineTo(S, 0);
  oc.closePath(); oc.fill();

  // Línia de color del tema al centre (com un element decoratiu)
  oc.strokeStyle = themeColor;
  oc.lineWidth = 10;
  oc.globalAlpha = 0.9;
  oc.strokeRect(margin, margin, S - margin * 2, S - margin * 2);
  oc.globalAlpha = 1;

  // ── Ara apliquem blur al canvas final ──
  const canvas = document.createElement('canvas');
  canvas.width = S; canvas.height = S;
  const ctx = canvas.getContext('2d');
  ctx.filter = 'blur(7px)';
  ctx.drawImage(off, 0, 0);

  // Sobreposem una lleugera capa del color del tema (tint)
  ctx.filter = 'none';
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = themeColor;
  ctx.fillRect(0, 0, S, S);
  ctx.globalAlpha = 1;

  return canvas;
}

function makeTextTexture(text, width = 1024, height = 240, fontSize = 36, color = '#ffffff') {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(10, 10, 20, 0.9)';
  ctx.fillRect(0, 0, width, height);
  ctx.fillStyle = color;
  ctx.font = `${fontSize}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const words = text.split(' ');
  const lines = [];
  let line = '';
  const maxWidth = width - 80;
  for (let word of words) {
    const test = line ? `${line} ${word}` : word;
    if (ctx.measureText(test).width > maxWidth) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  const lineHeight = fontSize * 1.2;
  const startY = height / 2 - (lines.length - 1) * lineHeight / 2;
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], width / 2, startY + i * lineHeight);
  }
  return new THREE.CanvasTexture(canvas);
}

// ─── HUB: sala inicial amb 6 imatges ─────────────────────────────────
const hubGroup = new THREE.Group();
scene.add(hubGroup);

// Terra del hub (un sol mesh, sense solapaments)
const hubFloorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const hubFloor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), hubFloorMat);
hubFloor.rotation.x = -Math.PI / 2;
hubGroup.add(hubFloor);

// Graella lleugeríssima per sobre del terra (pujada 1mm per evitar z-fighting)
const grid = new THREE.GridHelper(30, 30, 0x333344, 0x222233);
grid.position.y = 0.001;
hubGroup.add(grid);

// ── Cubs ──
const IMAGE_HEIGHT = 0.15;
const HOVER_FACTOR = 1.12;
const RADIUS       = 2.4;
const CUBE_Y       = 1.3;

const imageFiles = [
  'dinacil.png',
  'hydraulics.png',
  'pedro.png',
  'tekor.png',
  'eastern.png',
  'fundiciones.png',
];
const roomData = [
  {
    title: 'Ubicada en Tona, a 50km al norte de Barcelona, ofrece las funciones corporativas para todo el grupo',
    subtitle: 'C/Antoni Figueras ,91 Bloc B - 08551 Tona , Barcelona , España',
    image: 'dinacil.png',
  },
  {
    title: 'Ubicada en Tona, a 50km al norte de Barcelona, aqui es donde se fabrican los distribuidores hidraulicos.',
    subtitle: 'C/Antoni Figueras , 91 Bloc B - 08551 Tona , Barcelona, España',
    image: 'hydraulics.png',
  },
  {
    title: 'Ubicada en Vic a 60 km al norte de Barcelona. Especializada en la producción de bombas y motores hidráulicos, tanto de aluminio como de fundición',
    subtitle: 'Ctra. Sant Hipòlit, 10 - ​08500 , Vic, Barcelona, España',
    image: 'pedro.png',
  },
  {
    title: 'Ubicada en Centelles- 40 km al norte de Barcelona. Producción automatizada de cilindros hidráulicos pequeños.',
    subtitle: 'Ronda de la Font Grossa 26, Pol. Ind. La Gavarra - 08540 , Centelles, Barcelona, España',
    image: 'tekor.png',
  },
  {
    title: 'Inaugurada en 2015 en Ploiesti (Rumanía) a 60km de Bucarest. Fabricación de cilindros hidráulicos medianos y grandes.',
    subtitle: 'WDP Industrial Park / DN72 , Km. 3,2 - ​107025 Aricestii Rahtivani , Prahova , Romania',
    image: 'eastern.png',
  },
  {
    title: 'Ubicada en Roda de Ter, a 65 km al norte de Barcelona. Fundición especializada en piezas de fundición gris y nodular / SG / fundición dúctil.',
    subtitle: 'C/ Disseminats, S/N - 08510, Roda de Ter, Barcelona, España',
    image: 'fundiciones.png',
  },
];
const loader = new THREE.TextureLoader();

const cubes      = [];  // { mesh, index, prog, baseScale }
const labelPlanes = []; // mesh del cartell per cada cub

for (let i = 0; i < imageFiles.length; i++) {
  const angle = (i / 4) * Math.PI * 2;
  const x = Math.sin(angle) * RADIUS;
  const z = -Math.cos(angle) * RADIUS;
  const theme = themes[i];

  const geo = new THREE.PlaneGeometry(1, 1);
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.8,
    metalness: 0.0,
    side: THREE.DoubleSide,
  }));
  const imageTex = loader.load(imageFiles[i], tex => {
    const img = tex.image;
    if (img && img.width && img.height) {
      const aspect = img.width / img.height;
      const baseWidth = IMAGE_HEIGHT * aspect;
      mesh.scale.set(baseWidth, IMAGE_HEIGHT, 1);
      mesh.userData.baseScale.set(baseWidth, IMAGE_HEIGHT, 1);
    }
  });
  imageTex.encoding = THREE.sRGBEncoding;
  imageTex.minFilter = THREE.LinearMipMapLinearFilter;
  imageTex.magFilter = THREE.LinearFilter;
  imageTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  imageTex.generateMipmaps = true;
  mesh.material.map = imageTex;
  mesh.material.needsUpdate = true;

  mesh.position.set(x, CUBE_Y, z);
  mesh.scale.set(IMAGE_HEIGHT, IMAGE_HEIGHT, 1);
  mesh.userData.baseScale = new THREE.Vector3(IMAGE_HEIGHT, IMAGE_HEIGHT, 1);
  mesh.lookAt(0, CUBE_Y, 0);
  hubGroup.add(mesh);

  // ── Cartell: fons blanc, text negre ──
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 512; labelCanvas.height = 180;
  const lc = labelCanvas.getContext('2d');

  // Fons blanc arrodonit
  lc.fillStyle = '#ffffff';
  const r = 30;
  const w = 512, h = 180;
  lc.beginPath();
  lc.moveTo(r, 0);
  lc.lineTo(w - r, 0); lc.quadraticCurveTo(w, 0, w, r);
  lc.lineTo(w, h - r); lc.quadraticCurveTo(w, h, w - r, h);
  lc.lineTo(r, h); lc.quadraticCurveTo(0, h, 0, h - r);
  lc.lineTo(0, r); lc.quadraticCurveTo(0, 0, r, 0);
  lc.closePath(); lc.fill();

  // Text negre
  lc.fillStyle = '#111111';
  lc.font = 'bold 72px Arial';
  lc.textAlign = 'center';
  lc.textBaseline = 'middle';
  lc.fillText(theme.label, w / 2, h / 2);

  const labelTex = new THREE.CanvasTexture(labelCanvas);
  const labelMat = new THREE.MeshBasicMaterial({
    map: labelTex,
    transparent: true,
    opacity: 0,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  const labelMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.65, 0.23), labelMat);
  labelMesh.position.set(x, CUBE_Y, z);
  hubGroup.add(labelMesh);

  cubes.push({ mesh, index: i, prog: 0 });
  labelPlanes.push(labelMesh);
}

// ─── SALA: buida, parets grises + terra negre (plans separats, sense z-fighting) ──
let roomImageMesh = null;
let roomTitleMesh = null;
let roomSubtitleMesh = null;

const roomGroup = new THREE.Group();
roomGroup.visible = false;
scene.add(roomGroup);

function clearGroup(g) {
  while (g.children.length) {
    const c = g.children[0];
    g.remove(c);
    c.geometry?.dispose();
    if (c.material) {
      (Array.isArray(c.material) ? c.material : [c.material]).forEach(m => m.dispose());
    }
  }
}

function buildRoom(themeIndex) {
  clearGroup(roomGroup);

  const R = 6;     // mig costat de la sala (12x12m)
  const H = 4;     // alçada de la sala

  const FLOOR_COLOR = 0x0a0a0a;   // quasi negre

  // Terra ─ un sol PlaneGeometry, res més
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(R * 2, R * 2),
    new THREE.MeshStandardMaterial({ color: FLOOR_COLOR })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0;
  roomGroup.add(floor);

  roomGroup.add(new THREE.AmbientLight(0xffffff, 0.4));
  const light = new THREE.PointLight(0xffffff, 1.2, 20);
  light.position.set(0, H - 0.5, 0);
  roomGroup.add(light);

  const data = roomData[themeIndex];
  const tex = loader.load(data.image, t => {
    t.encoding = THREE.sRGBEncoding;
    t.minFilter = THREE.LinearMipMapLinearFilter;
    t.magFilter = THREE.LinearFilter;
    t.anisotropy = renderer.capabilities.getMaxAnisotropy();
    t.generateMipmaps = true;
    if (roomImageMesh) {
      const img = t.image;
      if (img && img.width && img.height) {
        const aspect = img.width / img.height;
        const height = 3.0;
        roomImageMesh.scale.set(height * aspect, height, 1);
      }
    }
  });

  roomImageMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 1),
    new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide })
  );
  roomImageMesh.position.set(0, 1.75, -2.5);
  roomGroup.add(roomImageMesh);

  const titleTex = makeTextTexture(data.title, 1024, 280, 28);
  roomTitleMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(4.8, 1.05),
    new THREE.MeshBasicMaterial({ map: titleTex, transparent: true, side: THREE.DoubleSide, depthWrite: false })
  );
  roomTitleMesh.position.set(0, 3.4, -2.2);
  roomGroup.add(roomTitleMesh);

  const subtitleTex = makeTextTexture(data.subtitle, 1024, 180, 24);
  roomSubtitleMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(4.8, 0.75),
    new THREE.MeshBasicMaterial({ map: subtitleTex, transparent: true, side: THREE.DoubleSide, depthWrite: false })
  );
  roomSubtitleMesh.position.set(0, 0.65, -2.2);
  roomGroup.add(roomSubtitleMesh);
}

// ─── BOTÓ VR ──────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
statusEl.textContent = 'Three.js carregat. Comprovant suport VR...';

if (navigator.xr) {
  let resolved = false;
  setTimeout(() => {
    if (!resolved) {
      statusEl.textContent = 'La comprovació VR triga massa. Prova de recarregar.';
      statusEl.style.color = '#fa0';
    }
  }, 5000);

  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    resolved = true;
    if (supported) {
      statusEl.textContent = 'Llest. Posa\'t les ulleres i prem el botó.';
      const btn = VRButton.createButton(renderer);
      document.body.appendChild(btn);
    } else {
      statusEl.textContent = 'VR immersiu no suportat. Obre per HTTPS amb el Meta Quest Browser.';
    }
  }).catch(err => {
    resolved = true;
    statusEl.textContent = 'Error VR: ' + err.message;
    statusEl.style.color = '#f66';
  });
} else {
  statusEl.textContent = 'WebXR no disponible. Fes servir el Meta Quest Browser.';
}

// ─── ESTAT ────────────────────────────────────────────────────────────
let state = 'hub';  // 'hub' | 'room'
const buttonStates = {};

// ─── DETECCIÓ DE QUIN CUB ES MIRA ─────────────────────────────────────
const _fwd = new THREE.Vector3();
const _cam = new THREE.Vector3();
const _to  = new THREE.Vector3();

function getLookedCube() {
  camera.getWorldDirection(_fwd);
  camera.getWorldPosition(_cam);
  let best = -1, bestDot = 0.72;
  for (let i = 0; i < cubes.length; i++) {
    _to.copy(cubes[i].mesh.position).sub(_cam).normalize();
    const d = _fwd.dot(_to);
    if (d > bestDot) { bestDot = d; best = i; }
  }
  return best;
}

// ─── ENTRADA / SORTIDA DE SALA ─────────────────────────────────────────
function enterRoom(idx) {
  buildRoom(idx);
  hubGroup.visible = false;
  roomGroup.visible = true;
  state = 'room';
}

function exitRoom() {
  clearGroup(roomGroup);
  roomGroup.visible = false;
  hubGroup.visible = true;
  state = 'hub';
}

// ─── CONTROLADORS ─────────────────────────────────────────────────────
const infoEl = document.getElementById('controllerInfo');

function handleInput(frame) {
  const session = renderer.xr.getSession();
  if (!session) return;

  const refSpace = renderer.xr.getReferenceSpace();
  let infoText = 'Posició dels mandos:\n';
  let anyController = false;

  for (const src of session.inputSources) {
    if (!src.gamepad) continue;

    // Posició
    if (frame && refSpace) {
      const space = src.gripSpace || src.targetRaySpace;
      if (space) {
        const pose = frame.getPose(space, refSpace);
        if (pose) {
          anyController = true;
          const p = pose.transform.position;
          const hand = src.handedness === 'right' ? 'Dret    ' : 'Esquerre';
          infoText += `${hand}: x=${p.x.toFixed(2)}  y=${p.y.toFixed(2)}  z=${p.z.toFixed(2)}\n`;
        }
      }
    }

    // Botons (mando dret)
    if (src.handedness !== 'right') continue;
    const gp = src.gamepad;
    const aPressed = gp.buttons[4]?.pressed;
    const bPressed = gp.buttons[5]?.pressed;

    if (aPressed && !buttonStates.a) {
      if (state === 'hub') {
        const idx = getLookedCube();
        if (idx !== -1) enterRoom(idx);
      }
    }
    if (bPressed && !buttonStates.b) {
      if (state === 'room') exitRoom();
    }
    buttonStates.a = aPressed;
    buttonStates.b = bPressed;
  }

  infoEl.textContent = anyController ? infoText : 'Mandos: cap detectat';
}

// ─── LOOP D'ANIMACIÓ ──────────────────────────────────────────────────
const _camPos2D = new THREE.Vector3();

function animate(time, frame) {
  if (state === 'hub') {
    camera.getWorldPosition(_camPos2D);

    const looked = getLookedCube();

    for (let i = 0; i < cubes.length; i++) {
      const c = cubes[i];

      // El pla es manté fix, sense girar
      const target = (i === looked) ? 1 : 0;
      c.prog += (target - c.prog) * 0.1;

      const hoverScale = 1 + (HOVER_FACTOR - 1) * c.prog;
      c.mesh.scale.copy(c.mesh.userData.baseScale).multiplyScalar(hoverScale);

      // Cartell: surt cap amunt i apareix
      const lp = labelPlanes[i];
      const baseY  = CUBE_Y;
      const floatY = CUBE_Y + 0.48;
      lp.position.y = baseY + (floatY - baseY) * c.prog;
      lp.material.opacity = c.prog;
      lp.lookAt(_camPos2D.x, lp.position.y, _camPos2D.z);
    }
  }

  handleInput(frame);
  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
