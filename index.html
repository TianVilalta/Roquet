<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene xr-mode-ui="enabled: true">
      <a-entity camera look-controls></a-entity>

      <a-sky color="#222233"></a-sky>

      <!-- Cub que es pot arrossegar -->
      <a-box id="dragCube"
             position="0 1.5 -2"
             depth="0.5" height="0.5" width="0.5"
             color="orange">
      </a-box>

      <!-- Model del mando -->
      <a-entity id="controller"
                geometry="primitive: box; width: 0.1; height: 0.05; depth: 0.2"
                material="color: cyan">
      </a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const controllerModel = document.getElementById('controller');
      const cube = document.getElementById('dragCube');

      let dragging = false;

      scene.renderer.xr.addEventListener('sessionstart', () => {
        const session = scene.renderer.xr.getSession();

        session.addEventListener('inputsourceschange', () => {
          for (const input of session.inputSources) {

            // Només volem mandos (no mans)
            if (input.targetRayMode === "tracked-pointer" && input.gamepad) {

              function update() {
                const frame = scene.renderer.xr.getFrame();
                const refSpace = scene.renderer.xr.getReferenceSpace();
                const pose = frame.getPose(input.targetRaySpace, refSpace);

                if (pose) {
                  const p = pose.transform.position;
                  const r = pose.transform.orientation;

                  // Actualitzar model del mando
                  controllerModel.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
                  controllerModel.object3D.quaternion.set(r.x, r.y, r.z, r.w);

                  // Distància entre mando i cub
                  const dx = p.x - cube.object3D.position.x;
                  const dy = p.y - cube.object3D.position.y;
                  const dz = p.z - cube.object3D.position.z;
                  const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                  // Trigger del mando
                  const trigger = input.gamepad.buttons[0].pressed;

                  // Si el mando toca el cub i apretes el trigger → agafar
                  if (dist < 0.4 && trigger) dragging = true;

                  // Si deixes anar el trigger → deixar
                  if (!trigger) dragging = false;

                  // Si estàs arrossegant → moure el cub amb el mando
                  if (dragging) {
                    cube.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
                  }
                }

                requestAnimationFrame(update);
              }

              update();
            }
          }
        });
      });
    </script>
  </body>
</html>
