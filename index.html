// ─── TEXTURA DIFUMINADA DEL INTERIOR DE CADA SALA ─────────────────────
// Dibuixem una perspectiva senzilla d'una sala sobre un canvas i la difuminem
function makeRoomPreviewTexture(theme) {
  const S = 256;
  // Canvas de dibuix sense blur
  const off = document.createElement('canvas');
  off.width = S; off.height = S;
  const oc = off.getContext('2d');

  const themeColor = '#' + new THREE.Color(theme.color).getHexString();

  // Fons / paret del fons: color accent del tema clar
  oc.fillStyle = '#aaaaaa';
  oc.fillRect(0, 0, S, S);

  // Perspectiva: punt de fuga al centre
  const cx = S * 0.5, cy = S * 0.48;
  const margin = S * 0.22;

  // Paret esquerra
  oc.fillStyle = '#999999';
  oc.beginPath();
  oc.moveTo(0, 0); oc.lineTo(cx, cy);
  oc.lineTo(cx, S); oc.lineTo(0, S);
  oc.closePath(); oc.fill();

  // Paret dreta
  oc.fillStyle = '#777777';
  oc.beginPath();
  oc.moveTo(S, 0); oc.lineTo(cx, cy);
  oc.lineTo(cx, S); oc.lineTo(S, S);
  oc.closePath(); oc.fill();

  // Terra negre
  oc.fillStyle = '#111111';
  oc.beginPath();
  oc.moveTo(0, S); oc.lineTo(cx, S * 0.72);
  oc.lineTo(S, S);
  oc.closePath(); oc.fill();

  // Sostre fosc
  oc.fillStyle = '#333333';
  oc.beginPath();
  oc.moveTo(0, 0); oc.lineTo(cx, S * 0.22);
  oc.lineTo(S, 0);
  oc.closePath(); oc.fill();

  // Línia de color del tema al centre (com un element decoratiu)
  oc.strokeStyle = themeColor;
  oc.lineWidth = 10;
  oc.globalAlpha = 0.9;
  oc.strokeRect(margin, margin, S - margin * 2, S - margin * 2);
  oc.globalAlpha = 1;

  // ── Ara apliquem blur al canvas final ──
  const canvas = document.createElement('canvas');
  canvas.width = S; canvas.height = S;
  const ctx = canvas.getContext('2d');
  ctx.filter = 'blur(7px)';
  ctx.drawImage(off, 0, 0);

  // Sobreposem una lleugera capa del color del tema (tint)
  ctx.filter = 'none';
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = themeColor;
  ctx.fillRect(0, 0, S, S);
  ctx.globalAlpha = 1;

  return canvas;
}

// ─── HUB: sala inicial amb 6 imatges ─────────────────────────────────────
const hubGroup = new THREE.Group();
scene.add(hubGroup);

// Terra del hub (un sol mesh, sense solapaments)
const hubFloorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const hubFloor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), hubFloorMat);
hubFloor.rotation.x = -Math.PI / 2;
hubGroup.add(hubFloor);

// Graella lleugeríssima per sobre del terra (pujada 1mm per evitar z-fighting)
const grid = new THREE.GridHelper(30, 30, 0x333344, 0x222233);
grid.position.y = 0.001;
hubGroup.add(grid);

// ── Imatges ──
const IMAGE_WIDTH = 1.2;
const IMAGE_HEIGHT = 0.8;
const HOVER_SCALE = 1.18;
const RADIUS = 2.8;
const IMAGE_Y = 1.0;

const loader = new THREE.TextureLoader();
const cubes = []; // { mesh, index, prog }
const labelTopPlanes = [];
const labelBottomPlanes = [];

for (let i = 0; i < themes.length; i++) {
  const angle = (i / themes.length) * Math.PI * 2;
  const x = Math.sin(angle) * RADIUS;
  const z = -Math.cos(angle) * RADIUS;
  const theme = themes[i];

  // Etiquetes (sup/inf) amb requadres arrodonits i text centrat
  const tcanvas = document.createElement('canvas');
  tcanvas.width = 1024; tcanvas.height = 320;
  const tc = tcanvas.getContext('2d');
  function roundedRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function drawWrappedTextCentered(ctx, text, centerX, maxWidth, lineHeight) {
    ctx.textBaseline = 'middle';
    const words = text.split(' ');
    const lines = [];
    let line = '';
    for (let n = 0; n < words.length; n++) {
      const testLine = line + words[n] + ' ';
      if (ctx.measureText(testLine).width > maxWidth && n > 0) {
        lines.push(line.trim());
        line = words[n] + ' ';
      } else line = testLine;
    }
    if (line) lines.push(line.trim());
    const totalH = lines.length * lineHeight;
    const canvasH = ctx.canvas ? ctx.canvas.height : 0;
    let startY = canvasH / 2 - totalH / 2 + lineHeight / 2;
    for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], centerX, startY + i * lineHeight);
  }

  // superior
  tc.clearRect(0,0,tcanvas.width,tcanvas.height);
  roundedRect(tc, 8, 8, tcanvas.width - 16, tcanvas.height - 16, 28);
  tc.fillStyle = 'rgba(255,255,255,0.98)';
  tc.fill();
  tc.fillStyle = '#111111';
  tc.font = 'bold 56px Arial';
  tc.textAlign = 'center';
  tc.shadowColor = 'rgba(0,0,0,0.45)';
  tc.shadowBlur = 10;
  drawWrappedTextCentered(tc, theme.text, tcanvas.width/2, tcanvas.width - 160, 52);
  const ttex = new THREE.CanvasTexture(tcanvas);
  const tmat = new THREE.MeshBasicMaterial({ map: ttex, transparent: true, side: THREE.DoubleSide });
  const tmesh = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.5), tmat);
  tmesh.position.set(x, IMAGE_Y + IMAGE_HEIGHT/2 + 0.34, z);
  tmesh.lookAt(0, IMAGE_Y + IMAGE_HEIGHT/2 + 0.35, 0);
  tmat.opacity = 0.25;
  hubGroup.add(tmesh);

  // inferior
  const bcanvas = document.createElement('canvas');
  bcanvas.width = 1024; bcanvas.height = 220;
  const bc = bcanvas.getContext('2d');
  bc.clearRect(0,0,bcanvas.width,bcanvas.height);
  roundedRect(bc, 8, 8, bcanvas.width - 16, bcanvas.height - 16, 20);
  bc.fillStyle = 'rgba(255,255,255,0.98)';
  bc.fill();
  bc.fillStyle = '#111111';
  bc.font = 'bold 40px Arial';
  bc.textAlign = 'center';
  bc.shadowColor = 'rgba(0,0,0,0.4)';
  bc.shadowBlur = 8;
  drawWrappedTextCentered(bc, theme.text2, bcanvas.width/2, bcanvas.width - 160, 40);
  const btex = new THREE.CanvasTexture(bcanvas);
  const bmat = new THREE.MeshBasicMaterial({ map: btex, transparent: true, side: THREE.DoubleSide });
  const bmesh = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.36), bmat);
  bmesh.position.set(x, IMAGE_Y - IMAGE_HEIGHT/2 - 0.45, z);
  bmesh.lookAt(0, IMAGE_Y - IMAGE_HEIGHT/2 - 0.25, 0);
  bmat.opacity = 0.25;
  hubGroup.add(bmesh);

  // Carrega imatge i ajusta aspect ratio (ample = meitat d'IMAGE_WIDTH)
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshStandardMaterial({ side: THREE.DoubleSide }));
  mesh.position.set(x, IMAGE_Y, z);
  mesh.lookAt(0, IMAGE_Y, 0);
  hubGroup.add(mesh);
  loader.load(theme.img, (texLoaded) => {
    mesh.material.map = texLoaded;
    mesh.material.needsUpdate = true;
    const iw = texLoaded.image?.naturalWidth || texLoaded.image?.width || 1024;
    const ih = texLoaded.image?.naturalHeight || texLoaded.image?.height || 1024;
    const w = IMAGE_WIDTH * 0.5; // meitat d'amplada
    const h = w * (ih / iw);
    mesh.geometry.dispose();
    mesh.geometry = new THREE.PlaneGeometry(w, h);
    mesh.position.set(x, IMAGE_Y, z);
    mesh.lookAt(0, IMAGE_Y, 0);
    // ajustem etiquetes segons nova alçada
    tmesh.geometry.dispose();
    tmesh.geometry = new THREE.PlaneGeometry(Math.max(w * 1.6, 0.6), 0.5);
    bmesh.geometry.dispose();
    bmesh.geometry = new THREE.PlaneGeometry(Math.max(w * 1.6, 0.6), 0.36);
    // compute positions using image actual height and offset slightly toward camera
    const imgPos = mesh.position.clone();
    const tY = IMAGE_Y + h/2 + 0.34;
    const bY = IMAGE_Y - h/2 - 0.45;
    tmesh.position.set(imgPos.x, tY, imgPos.z);
    bmesh.position.set(imgPos.x, bY, imgPos.z);
  });

  cubes.push({ mesh, index: i, prog: 0 });
  labelTopPlanes.push(tmesh);
  labelBottomPlanes.push(bmesh);
}

// util: dibuixa text amb salt de línia simple
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    const testWidth = metrics.width;
    if (testWidth > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}

// ─── SALA: buida, parets grises + terra negre (plans separats, sense z-fighting) ──
const roomGroup = new THREE.Group();
roomGroup.visible = false;
scene.add(roomGroup);

function clearGroup(g) {
  while (g.children.length) {
    const c = g.children[0];
    g.remove(c);
    c.geometry?.dispose();
    if (c.material) {
      (Array.isArray(c.material) ? c.material : [c.material]).forEach(m => m.dispose());
    }
  }
}

function buildRoom(themeIndex) {
  clearGroup(roomGroup);

  const R = 6;     // mig costat de la sala (12x12m)
  const H = 4;     // alçada de la sala

  const FLOOR_COLOR = 0x0a0a0a;   // quasi negre
  const WALL_COLOR  = 0x7a7a7a;   // gris mig

  // Terra ─ un sol PlaneGeometry, res més
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(R * 2, R * 2),
    new THREE.MeshStandardMaterial({ color: FLOOR_COLOR })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0;
  roomGroup.add(floor);

  // Sostre
  const ceil = new THREE.Mesh(
    new THREE.PlaneGeometry(R * 2, R * 2),
    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, side: THREE.BackSide })
  );
  ceil.rotation.x = -Math.PI / 2;
  ceil.position.y = H;
  roomGroup.add(ceil);

  // 4 parets (plans individuals, cara visible cap endins)
  const wallMat = new THREE.MeshStandardMaterial({ color: WALL_COLOR, side: THREE.BackSide });
  const wallGeo = new THREE.PlaneGeometry(R * 2, H);

  const wallConfigs = [
    { pos: [0, H / 2, -R], rot: [0, 0, 0] },         // davant
    { pos: [0, H / 2,  R], rot: [0, Math.PI, 0] },   // darrere
    { pos: [-R, H / 2, 0], rot: [0, Math.PI / 2, 0] },  // esquerra
    { pos: [ R, H / 2, 0], rot: [0, -Math.PI / 2, 0] }, // dreta
  ];

  wallConfigs.forEach(({ pos, rot }) => {
    const wall = new THREE.Mesh(wallGeo, wallMat);
    wall.position.set(...pos);
    wall.rotation.set(...rot);
    roomGroup.add(wall);
  });

  // Llum suau al centre de la sala
  const light = new THREE.PointLight(0xffffff, 1.5, 20);
  light.position.set(0, H - 0.5, 0);
  roomGroup.add(light);

  // Cartell del nom de la sala a la paret del davant
  const theme = themes[themeIndex];
  const nc = document.createElement('canvas');
  nc.width = 1024; nc.height = 256;
  const nctx = nc.getContext('2d');

  // Fons blanc arrodonit
  nctx.fillStyle = '#ffffff';
  const rr = 40, ww = 1024, hh = 256;
  nctx.beginPath();
  nctx.moveTo(rr, 0); nctx.lineTo(ww - rr, 0); nctx.quadraticCurveTo(ww, 0, ww, rr);
  nctx.lineTo(ww, hh - rr); nctx.quadraticCurveTo(ww, hh, ww - rr, hh);
  nctx.lineTo(rr, hh); nctx.quadraticCurveTo(0, hh, 0, hh - rr);
  nctx.lineTo(0, rr); nctx.quadraticCurveTo(0, 0, rr, 0);
  nctx.closePath(); nctx.fill();

  // removed room title sign per request (no 'Ubicació X' text)

  // Labels dins la sala: Historia, Productes, Grup
  roomLabels.length = 0;
  const labels = ['Historia', 'Productes', 'Grup'];
  const RL_RADIUS = 2.0;
  const RL_Y = 1.6;
  for (let i = 0; i < labels.length; i++) {
    const ang = (i / labels.length) * Math.PI * 2;
    const lx = Math.sin(ang) * RL_RADIUS;
    const lz = -Math.cos(ang) * RL_RADIUS;

    // canvas with rounded rect
    const lc = document.createElement('canvas'); lc.width = 512; lc.height = 120;
    const lctx = lc.getContext('2d');
    function rrect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
    lctx.clearRect(0,0,lc.width,lc.height);
    rrect(lctx,6,6,lc.width-12,lc.height-12,18);
    lctx.fillStyle = 'rgba(255,255,255,0.98)'; lctx.fill();
    lctx.fillStyle = '#111111'; lctx.font = 'bold 56px Arial'; lctx.textAlign = 'center';
    lctx.fillText(labels[i], lc.width/2, lc.height/2 + 8);

    const ltex = new THREE.CanvasTexture(lc);
    const lmat = new THREE.MeshBasicMaterial({ map: ltex, transparent: true, side: THREE.DoubleSide });
    const lmesh = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.35), lmat);
    lmesh.position.set(lx, RL_Y, lz);
    lmesh.lookAt(0, RL_Y, 0);
    lmat.opacity = 0.4; // base visibility
    roomGroup.add(lmesh);

    roomLabels.push({ mesh: lmesh, index: i, prog: 0, text: labels[i] });
  }
}

// ─── BOTÓ VR ──────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
statusEl.textContent = 'Three.js carregat. Comprovant suport VR...';

if (navigator.xr) {
  let resolved = false;
  setTimeout(() => {
    if (!resolved) {
      statusEl.textContent = 'La comprovació VR triga massa. Prova de recarregar.';
      statusEl.style.color = '#fa0';
    }
  }, 5000);

  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    resolved = true;
    if (supported) {
      statusEl.textContent = 'Llest. Posa\'t les ulleres i prem el botó.';
      const btn = VRButton.createButton(renderer);
      document.body.appendChild(btn);
    } else {
      statusEl.textContent = 'VR immersiu no suportat. Obre per HTTPS amb el Meta Quest Browser.';
    }
  }).catch(err => {
    resolved = true;
    statusEl.textContent = 'Error VR: ' + err.message;
    statusEl.style.color = '#f66';
  });
} else {
  statusEl.textContent = 'WebXR no disponible. Fes servir el Meta Quest Browser.';
}

// ─── ESTAT ────────────────────────────────────────────────────────────
let state = 'hub';  // 'hub' | 'room'
const buttonStates = {};
const roomLabels = []; // labels inside a room
let roomWindow = null;  // currently opened floating window in room

// ─── DETECCIÓ DE QUIN CUB ES MIRA ─────────────────────────────────────
const _fwd = new THREE.Vector3();
const _cam = new THREE.Vector3();
const _to  = new THREE.Vector3();

function getLookedCube() {
  camera.getWorldDirection(_fwd);
  camera.getWorldPosition(_cam);
  let best = -1, bestDot = 0.72;
  for (let i = 0; i < cubes.length; i++) {
    _to.copy(cubes[i].mesh.position).sub(_cam).normalize();
    const d = _fwd.dot(_to);
    if (d > bestDot) { bestDot = d; best = i; }
  }
  return best;
}

function getLookedRoomLabel() {
  camera.getWorldDirection(_fwd);
  camera.getWorldPosition(_cam);
  let best = -1, bestDot = 0.7;
  for (let i = 0; i < roomLabels.length; i++) {
    _to.copy(roomLabels[i].mesh.position).sub(_cam).normalize();
    const d = _fwd.dot(_to);
    if (d > bestDot) { bestDot = d; best = i; }
  }
  return best;
}

function openLabelWindow(ridx) {
  // remove existing
  if (roomWindow) { roomGroup.remove(roomWindow); roomWindow.geometry?.dispose(); (Array.isArray(roomWindow.material)?roomWindow.material:[roomWindow.material]).forEach(m=>m.dispose()); roomWindow = null; }
  const info = roomLabels[ridx];
  const p = info.mesh.position.clone();
  // create canvas with same style
  const cw = 1024, ch = 512;
  const c = document.createElement('canvas'); c.width = cw; c.height = ch;
  const ctx = c.getContext('2d');
  function rrect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  ctx.clearRect(0,0,cw,ch); rrect(ctx,12,12,cw-24,ch-24,28); ctx.fillStyle='rgba(255,255,255,0.98)'; ctx.fill();
  ctx.fillStyle = '#111111'; ctx.font = 'bold 64px Arial'; ctx.textAlign='center'; ctx.fillText(info.text, cw/2, ch/2);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
  const geom = new THREE.PlaneGeometry(1.6, 0.8);
  const mesh = new THREE.Mesh(geom, mat);
  // position window slightly toward the camera so it appears in front of the label
  camera.getWorldPosition(_cam);
  const dir = _cam.clone().sub(p).normalize();
  const frontPos = p.clone().add(dir.multiplyScalar(0.6));
  mesh.position.copy(frontPos);
  mesh.lookAt(_cam.x, frontPos.y, _cam.z);
  roomGroup.add(mesh);
  roomWindow = mesh;
}

// ─── ENTRADA / SORTIDA DE SALA ─────────────────────────────────────────
function enterRoom(idx) {
  buildRoom(idx);
  hubGroup.visible = false;
  roomGroup.visible = true;
  state = 'room';
}

function exitRoom() {
  clearGroup(roomGroup);
  roomGroup.visible = false;
  hubGroup.visible = true;
  state = 'hub';
}

// ─── CONTROLADORS ─────────────────────────────────────────────────────
const infoEl = document.getElementById('controllerInfo');

function handleInput(frame) {
  const session = renderer.xr.getSession();
  if (!session) return;

  const refSpace = renderer.xr.getReferenceSpace();
  let infoText = 'Posició dels mandos:\n';
  let anyController = false;

  for (const src of session.inputSources) {
    if (!src.gamepad) continue;

    // Posició
    if (frame && refSpace) {
      const space = src.gripSpace || src.targetRaySpace;
      if (space) {
        const pose = frame.getPose(space, refSpace);
        if (pose) {
          anyController = true;
          const p = pose.transform.position;
          const hand = src.handedness === 'right' ? 'Dret    ' : 'Esquerre';
          infoText += `${hand}: x=${p.x.toFixed(2)}  y=${p.y.toFixed(2)}  z=${p.z.toFixed(2)}\n`;
        }
      }
    }

    // Botons (mando dret)
    if (src.handedness !== 'right') continue;
    const gp = src.gamepad;
    const aPressed = gp.buttons[4]?.pressed;
    const bPressed = gp.buttons[5]?.pressed;

    if (aPressed && !buttonStates.a) {
      if (state === 'hub') {
        const idx = getLookedCube();
        if (idx !== -1) enterRoom(idx);
      } else if (state === 'room') {
        // in-room: check looked room label
        const ridx = getLookedRoomLabel();
        if (ridx !== -1) {
          // open floating window at label
          openLabelWindow(ridx);
        }
      }
    }
    if (bPressed && !buttonStates.b) {
      if (state === 'room') {
        // if a floating window is open, close it first
        if (roomWindow) {
          roomGroup.remove(roomWindow);
          roomWindow.geometry?.dispose();
          (roomWindow.material && (Array.isArray(roomWindow.material)?roomWindow.material:[roomWindow.material])).forEach(m=>m.dispose());
          roomWindow = null;
        } else {
          exitRoom();
        }
      }
    }
    buttonStates.a = aPressed;
    buttonStates.b = bPressed;
  }

  infoEl.textContent = anyController ? infoText : 'Mandos: cap detectat';
}

// ─── LOOP D'ANIMACIÓ ──────────────────────────────────────────────────
const _camPos2D = new THREE.Vector3();

function animate(time, frame) {
  if (state === 'hub') {
    camera.getWorldPosition(_camPos2D);

    const looked = getLookedCube();

    for (let i = 0; i < cubes.length; i++) {
      const c = cubes[i];
      // Suau animació cap al focus
      const target = (i === looked) ? 1 : 0;
      c.prog += (target - c.prog) * 0.12;
      const s = 1 + (HOVER_SCALE - 1) * c.prog;
      c.mesh.scale.setScalar(s);
      const camPos3 = new THREE.Vector3(); camera.getWorldPosition(camPos3);
      c.mesh.lookAt(camPos3.x, camPos3.y - 0.25, camPos3.z);

      // Labels: apareixen quan l'element està enfocat; usem l'altura real de la imatge
      const tp = labelTopPlanes[i];
      const bp = labelBottomPlanes[i];
      const geoH = (c.mesh.geometry && c.mesh.geometry.parameters && c.mesh.geometry.parameters.height) ? c.mesh.geometry.parameters.height : IMAGE_HEIGHT;
      // move top text slightly higher and bottom text slightly higher
      const topBaseOffset = 0.34;
      const bottomBaseOffset = 0.45;
      const topY = IMAGE_Y + geoH / 2 + topBaseOffset;
      const botY = IMAGE_Y - geoH / 2 - bottomBaseOffset;
      tp.position.y = topY;
      bp.position.y = botY;
      // keep texts at same distance as the image
      const imgPos = c.mesh.position.clone();
      tp.position.x = imgPos.x;
      tp.position.z = imgPos.z;
      bp.position.x = imgPos.x;
      bp.position.z = imgPos.z;
      const base = 0.25; // visible even when not focused
      const vis = base + (1 - base) * c.prog;
      tp.material.opacity = vis;
      bp.material.opacity = vis;
      tp.lookAt(_camPos2D.x, tp.position.y, _camPos2D.z);
      bp.lookAt(_camPos2D.x, bp.position.y, _camPos2D.z);
      tp.rotateX(-0.12);
      bp.rotateX(-0.12);
    }
  }
  else if (state === 'room') {
    // animate room labels
    camera.getWorldPosition(_camPos2D);
    const looked = getLookedRoomLabel();
    for (let i = 0; i < roomLabels.length; i++) {
      const r = roomLabels[i];
      const target = (i === looked) ? 1 : 0;
      r.prog += (target - r.prog) * 0.12;
      const s = 1 + 0.25 * r.prog;
      r.mesh.scale.setScalar(s);
      const base = 0.4;
      const vis = base + (1 - base) * r.prog;
      r.mesh.material.opacity = vis;
      r.mesh.lookAt(_camPos2D.x, r.mesh.position.y, _camPos2D.z);
    }
  }

  handleInput(frame);
  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
