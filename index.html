<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roquet VR</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
    color: white;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    text-align: center;
    padding: 20px;
    pointer-events: none;
  }
  #status { margin-top: 10px; font-size: 14px; color: #aaa; }
  #controllerInfo {
    position: absolute;
    top: 10px; left: 10px;
    font-size: 12px;
    line-height: 1.6;
    background: rgba(0,0,0,0.55);
    padding: 8px 14px;
    border-radius: 8px;
    pointer-events: none;
    white-space: pre;
  }
  #hud {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    background: rgba(0,0,0,0.65);
    color: white;
    border-radius: 10px;
    padding: 6px 8px;
    text-align: center;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #hud img.logo { height: 28px; margin-bottom: 6px; }
  #hud .controller { width: 220px; height: 64px; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="overlay">
  <h2>Sales VR — Quest 3</h2>
  <div id="status">Carregant...</div>
</div>
<div id="controllerInfo">Mandos: esperant sessió VR...</div>
<div id="hud">

    <text x="200" y="40" font-size="14" fill="#ccc" text-anchor="middle">A = Entrar</text>
    <text x="200" y="62" font-size="14" fill="#ccc" text-anchor="middle">B = Sortir</text>
    <text x="200" y="92" font-size="12" fill="#888" text-anchor="middle">Meta Quest 3</text>
  </svg>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

<script>
  window.addEventListener('error', e => {
    const s = document.getElementById('status');
    if (s) { s.textContent = 'Error: ' + (e.message || e); s.style.color = '#f66'; }
  });
  window.addEventListener('unhandledrejection', e => {
    const s = document.getElementById('status');
    if (s) { s.textContent = 'Error: ' + (e.reason?.message ?? e.reason); s.style.color = '#f66'; }
  });
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ─── RENDER ────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
// Espai de color i tone mapping correctes: sense això, els materials PBR
// del glTF (que assumeixen un renderer "físicament correcte") surten molt
// més foscos del que haurien.
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor');
renderer.xr.addEventListener('sessionend', () => {
  exitRoom();
});
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
// El fons ja no és passthrough ni negre pla: el model room.glb fa de fons/entorn.
scene.background = new THREE.Color(0x0a0a0a);

// Entorn d'il·luminació (IBL) neutre: imprescindible perquè els materials
// PBR (metalness/roughness) del glTF no surtin negres allà on són metàl·lics
// o reflectants — sense un envMap, aquestes zones no tenen res a reflectir
// i el resultat és negre pur encara que hi hagi llums a l'escena.
const pmremGenerator = new THREE.PMREMGenerator(renderer);
scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);

// Llum global més intensa i repartida des de diverses direccions perquè no
// quedin cares del model completament a les fosques.
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(3, 6, 4);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.9);
fillLight.position.set(-4, 3, -3);
scene.add(fillLight);
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

// ─── HUD 3D subjecte a la càmera (segueix la vista) ─────────────────
const hud3D = new THREE.Group();
camera.add(hud3D);
hud3D.position.set(0, -0.35, -0.9);
hud3D.rotation.set(0, 0, 0);

// fons semi-transparent del HUD
const hudBg = new THREE.Mesh(
  new THREE.PlaneGeometry(0.36, 0.12),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.6 })
);
hud3D.add(hudBg);

// carreguem logo i el posem a l'esquerra superior del panel
const texLoader = new THREE.TextureLoader();
texLoader.load('roquet.png', (tex) => {
  const w = 0.18;
  const aspect = (tex.image && tex.image.width) ? (tex.image.width / tex.image.height) : 2;
  const h = w / aspect;
  const logo = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true })
  );
  logo.position.set(-0.09, 0.02, 0.01);
  hud3D.add(logo);
});

// dibuixem el controlador en un canvas i el convertim a textura
const ctrlCanvas = document.createElement('canvas');
ctrlCanvas.width = 600; ctrlCanvas.height = 200;
const cctx = ctrlCanvas.getContext('2d');
function drawControllerPreview(ctx) {
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  ctx.fillStyle = '#222'; ctx.strokeStyle = '#444'; ctx.lineWidth = 6;
  const rx = 20, ry = 20, rw = ctx.canvas.width-40, rh = ctx.canvas.height-40;
  // rounded rect
  ctx.beginPath();
  ctx.moveTo(20+rx,20);
  ctx.arcTo(20+rw,20,20+rw,20+rh,ry);
  ctx.arcTo(20+rw,20+rh,20,20+rh,ry);
  ctx.arcTo(20,20+rh,20,20,ry);
  ctx.arcTo(20,20,20+rw,20,ry);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // A button (green)
  ctx.fillStyle = '#0b8f0b'; ctx.beginPath(); ctx.arc(420, 100, 28, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 36px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('A', 420, 100);
  // B button (red)
  ctx.fillStyle = '#b00'; ctx.beginPath(); ctx.arc(500, 100, 28, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.fillText('B', 500, 100);

  // labels
  ctx.fillStyle = '#ccc'; ctx.font = '18px Arial'; ctx.fillText('A = Entrar', 460, 40);
  ctx.fillText('B = Sortir', 460, 68);
  ctx.fillStyle = '#888'; ctx.font = '14px Arial'; ctx.fillText('Meta Quest 3', 460, 150);
}
drawControllerPreview(cctx);
const ctrlTex = new THREE.CanvasTexture(ctrlCanvas);
const ctrlMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.26, 0.10),
    new THREE.MeshBasicMaterial({ map: ctrlTex, transparent: true })
  );
  ctrlMesh.position.set(0, -0.03, 0.01);

// ─── TEMES ────────────────────────────────────────────────────────────
const themes = [
  { label: 'Ubicació 1', color: 0xe63946, img: 'pedro.png',
    text: 'Ubicada en Tona, a 50km al norte de Barcelona, ofrece las funciones corporativas para todo el grupo',
    text2: '08551 Tona , Barcelona , España' },
  { label: 'Ubicació 2', color: 0x2dc653, img: 'hydraulics.png',
    text: 'Ubicada en Tona, a 50km al norte de Barcelona, aqui es donde se fabrican los distribuidores hidraulicos.',
    text2: '08551 Tona , Barcelona, España' },
  { label: 'Ubicació 3', color: 0x4895ef, img: 'fundiciones.png',
    text: 'Ubicada en Vic a 60 km al norte de Barcelona. Especializada en la producción de bombas y motores hidráulicos, tanto de aluminio como de fundición',
    text2: '08510, Roda de Ter, Barcelona, España' },
  { label: 'Ubicació 4', color: 0xf4a261, img: 'dinacil.png',
    text: 'Ubicada en Centelles a 40 km al norte de Barcelona. Producción automatizada de cilindros hidráulicos pequeños.',
    text2: '08540 , Centelles, Barcelona, España' },
  { label: 'Ubicació 5', color: 0xff8844, img: 'eastern.png',
    text: 'Inaugurada en 2015 en Ploiesti (Rumanía) a 60km de Bucarest. Fabricación de cilindros hidráulicos medianos y grandes.',
    text2: '​107025 Aricestii Rahtivani , Prahova , Romania' },
  { label: 'Ubicació 6', color: 0x8a6cff, img: 'tekor.png',
    text: 'Ubicada en Roda de Ter, a 65 km al norte de Barcelona. Fundición especializada en piezas de fundición gris y nodular / SG / fundición dúctil.',
    text2: '​08500 , Vic, Barcelona, España' },
];

// ─── TEXTURA DIFUMINADA DEL INTERIOR DE CADA SALA ─────────────────────
// Dibuixem una perspectiva senzilla d'una sala sobre un canvas i la difuminem
function makeRoomPreviewTexture(theme) {
  const S = 256;
  // Canvas de dibuix sense blur
  const off = document.createElement('canvas');
  off.width = S; off.height = S;
  const oc = off.getContext('2d');

  const themeColor = '#' + new THREE.Color(theme.color).getHexString();

  // Fons / paret del fons: color accent del tema clar
  oc.fillStyle = '#aaaaaa';
  oc.fillRect(0, 0, S, S);

  // Perspectiva: punt de fuga al centre
  const cx = S * 0.5, cy = S * 0.48;
  const margin = S * 0.22;

  // Paret esquerra
  oc.fillStyle = '#999999';
  oc.beginPath();
  oc.moveTo(0, 0); oc.lineTo(cx, cy);
  oc.lineTo(cx, S); oc.lineTo(0, S);
  oc.closePath(); oc.fill();

  // Paret dreta
  oc.fillStyle = '#777777';
  oc.beginPath();
  oc.moveTo(S, 0); oc.lineTo(cx, cy);
  oc.lineTo(cx, S); oc.lineTo(S, S);
  oc.closePath(); oc.fill();

  // Terra negre
  oc.fillStyle = '#111111';
  oc.beginPath();
  oc.moveTo(0, S); oc.lineTo(cx, S * 0.72);
  oc.lineTo(S, S);
  oc.closePath(); oc.fill();

  // Sostre fosc
  oc.fillStyle = '#333333';
  oc.beginPath();
  oc.moveTo(0, 0); oc.lineTo(cx, S * 0.22);
  oc.lineTo(S, 0);
  oc.closePath(); oc.fill();

  // Línia de color del tema al centre (com un element decoratiu)
  oc.strokeStyle = themeColor;
  oc.lineWidth = 10;
  oc.globalAlpha = 0.9;
  oc.strokeRect(margin, margin, S - margin * 2, S - margin * 2);
  oc.globalAlpha = 1;

  // ── Ara apliquem blur al canvas final ──
  const canvas = document.createElement('canvas');
  canvas.width = S; canvas.height = S;
  const ctx = canvas.getContext('2d');
  ctx.filter = 'blur(7px)';
  ctx.drawImage(off, 0, 0);

  // Sobreposem una lleugera capa del color del tema (tint)
  ctx.filter = 'none';
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = themeColor;
  ctx.fillRect(0, 0, S, S);
  ctx.globalAlpha = 1;

  return canvas;
}

// ─── FONS DE L'ESCENA: GLB de fons per a cada sala ─────────────────────
// Carreguem el model escanejat de la sala UNA sola vegada i el deixem fix
// al món (no enganxat a la càmera), fent de "fons" per a tota l'experiència.
const ROOM_TARGET_HEIGHT = 12.0;
const backgroundGroup = new THREE.Group();
scene.add(backgroundGroup);

function getThemeBackgroundAsset(theme) {
  if (!theme?.img) return 'room.glb';
  return theme.img.replace(/\.[^.]+$/, '.glb');
}

function loadRoomBackground(assetPath = 'room.glb') {
  const glLoader = new GLTFLoader();
  glLoader.load(
    assetPath,
    (gltf) => {
      const model = gltf.scene;

      clearGroup(backgroundGroup);

      model.traverse((obj) => {
        if (obj.isMesh && obj.material) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          const newMats = mats.map((m) => {
            const basic = new THREE.MeshBasicMaterial({
              map: m.map || null,
              color: m.map ? 0xffffff : (m.color || 0xffffff),
              side: THREE.DoubleSide,
              transparent: !!m.transparent,
              opacity: m.opacity !== undefined ? m.opacity : 1,
            });
            if (basic.map) {
              basic.map.colorSpace = THREE.SRGBColorSpace;
              basic.map.anisotropy = renderer.capabilities.getMaxAnisotropy();
              basic.map.needsUpdate = true;
            }
            m.dispose();
            return basic;
          });
          obj.material = Array.isArray(obj.material) ? newMats : newMats[0];
        }
      });

      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);
      const height = size.y || 1;
      const scale = ROOM_TARGET_HEIGHT / height;
      model.scale.setScalar(scale);

      box.setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.x -= center.x;
      model.position.z -= center.z;
      model.position.y -= box.min.y;
      model.position.y -= 3;
      model.rotation.y = Math.PI;

      backgroundGroup.add(model);
    },
    undefined,
    (error) => {
      console.error(`No s'ha pogut carregar ${assetPath}`, error);
      const s = document.getElementById('status');
      if (s) { s.textContent = `No s'ha pogut carregar ${assetPath} (fons)`; s.style.color = '#f66'; }
    }
  );
}
loadRoomBackground();

// ─── HUB: sala inicial amb 6 imatges ─────────────────────────────────────
const hubGroup = new THREE.Group();
scene.add(hubGroup);

// ── Imatges ──
const IMAGE_WIDTH = 1.2;
const IMAGE_HEIGHT = .8;
const HOVER_SCALE = 1.18;
const RADIUS = 2.8;
const IMAGE_Y = 1.0;

const loader = new THREE.TextureLoader();
const cubes = []; // { mesh, index, prog }
const labelBottomPlanes = [];

for (let i = 0; i < themes.length; i++) {
  const angle = (i / themes.length) * Math.PI * 2;
  const x = Math.sin(angle) * RADIUS;
  const z = -Math.cos(angle) * RADIUS;
  const theme = themes[i];

  // Etiquetes (sup/inf) amb requadres arrodonits i text centrat
  const tcanvas = document.createElement('canvas');
  tcanvas.width = 1024; tcanvas.height = 320;
  const tc = tcanvas.getContext('2d');
  function roundedRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function drawWrappedTextCentered(ctx, text, centerX, maxWidth, lineHeight) {
    ctx.textBaseline = 'middle';
    const words = text.split(' ');
    const lines = [];
    let line = '';
    for (let n = 0; n < words.length; n++) {
      const testLine = line + words[n] + ' ';
      if (ctx.measureText(testLine).width > maxWidth && n > 0) {
        lines.push(line.trim());
        line = words[n] + ' ';
      } else line = testLine;
    }
    if (line) lines.push(line.trim());
    const totalH = lines.length * lineHeight;
    const canvasH = ctx.canvas ? ctx.canvas.height : 0;
    let startY = canvasH / 2 - totalH / 2 + lineHeight / 2;
    for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], centerX, startY + i * lineHeight);
  }

  // inferior
  const bcanvas = document.createElement('canvas');
  bcanvas.width = 1024; bcanvas.height = 160;
  const bc = bcanvas.getContext('2d');
  bc.clearRect(0,0,bcanvas.width,bcanvas.height);
  bc.fillStyle = '#111111';
  bc.font = 'bold 40px Arial';
  bc.textAlign = 'center';
  bc.shadowColor = 'rgba(0,0,0,0.4)';
  bc.shadowBlur = 8;
  drawWrappedTextCentered(bc, theme.text2, bcanvas.width/2, bcanvas.width - 160, 40);
  const btex = new THREE.CanvasTexture(bcanvas);
  const bmat = new THREE.MeshBasicMaterial({ map: btex, transparent: true, side: THREE.DoubleSide });
  const bmesh = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.28), bmat);
  bmesh.position.set(x, IMAGE_Y - IMAGE_HEIGHT/2 - 0.12, z);
  bmesh.lookAt(0, IMAGE_Y - IMAGE_HEIGHT/2 - 0.12, 0);
  hubGroup.add(bmesh);

  // Carrega imatge i ajusta aspect ratio (ample = meitat d'IMAGE_WIDTH)
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshStandardMaterial({ side: THREE.DoubleSide }));
  mesh.position.set(x, IMAGE_Y, z);
  mesh.lookAt(0, IMAGE_Y, 0);
  hubGroup.add(mesh);
  loader.load(theme.img, (texLoaded) => {
    mesh.material.map = texLoaded;
    mesh.material.needsUpdate = true;
    const iw = texLoaded.image?.naturalWidth || texLoaded.image?.width || 1024;
    const ih = texLoaded.image?.naturalHeight || texLoaded.image?.height || 1024;
    const w = IMAGE_WIDTH * 0.5; // meitat d'amplada
    const h = w * (ih / iw);
    mesh.geometry.dispose();
    mesh.geometry = new THREE.PlaneGeometry(w, h);
    mesh.position.set(x, IMAGE_Y, z);
    mesh.lookAt(0, IMAGE_Y, 0);
    // ajustem etiquetes segons nova alçada
    bmesh.geometry.dispose();
    bmesh.geometry = new THREE.PlaneGeometry(Math.max(w * 1.6, 0.6), 0.36);
    // compute positions using image actual height
    const imgPos = mesh.position.clone();
    const bY = IMAGE_Y - h/2 - 0.45;
    bmesh.position.set(imgPos.x, bY, imgPos.z);
  });

  cubes.push({ mesh, index: i, prog: 0 });
  labelBottomPlanes.push(bmesh);
}

// util: dibuixa text amb salt de línia simple
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    const testWidth = metrics.width;
    if (testWidth > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}

// ─── SALA: continguts flotants (labels) sobre el fons room.glb ──
// room.glb ja s'ha carregat com a fons global de tota l'escena (veure
// loadRoomBackground() més amunt), així que aquí només gestionem els
// elements flotants propis de cada sala (etiquetes Historia/Productes/Grup).
const roomGroup = new THREE.Group();
roomGroup.visible = false;
scene.add(roomGroup);

function clearGroup(g, preserveKey = '') {
  while (g.children.length) {
    const c = g.children[0];
    g.remove(c);
    const shouldPreserve = preserveKey && c.userData?.[preserveKey];
    if (shouldPreserve) continue;
    c.geometry?.dispose();
    if (c.material) {
      (Array.isArray(c.material) ? c.material : [c.material]).forEach(m => m.dispose());
    }
  }
}

function buildRoom(themeIndex) {
  clearGroup(roomGroup);

  const theme = themes[themeIndex];
  if (theme) {
    loadRoomBackground(getThemeBackgroundAsset(theme));
  }

  // Labels dins la sala: Historia, Productes, Grup
  roomLabels.length = 0;
  const labels = ['Historia', 'Productes', 'Grup'];
  const RL_RADIUS = 2.4;
  const RL_Y = 1.2;
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  dir.y = 0;
  if (dir.lengthSq() === 0) dir.set(0, 0, -1);
  dir.normalize();
  const baseAngle = Math.atan2(dir.x, -dir.z);
  const labelAngles = [baseAngle, baseAngle + (2 * Math.PI / 3), baseAngle - (2 * Math.PI / 3)];
  for (let i = 0; i < labels.length; i++) {
    const ang = labelAngles[i];
    const lx = Math.sin(ang) * RL_RADIUS;
    const lz = -Math.cos(ang) * RL_RADIUS;

    // canvas with rounded rect
    const lc = document.createElement('canvas'); lc.width = 512; lc.height = 120;
    const lctx = lc.getContext('2d');
    function rrect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
    lctx.clearRect(0,0,lc.width,lc.height);
    rrect(lctx,6,6,lc.width-12,lc.height-12,18);
    lctx.fillStyle = 'rgba(255,255,255,0.98)'; lctx.fill();
    lctx.fillStyle = '#111111'; lctx.font = 'bold 56px Arial'; lctx.textAlign = 'center';
    lctx.fillText(labels[i], lc.width/2, lc.height/2 + 8);

    const ltex = new THREE.CanvasTexture(lc);
    const lmat = new THREE.MeshBasicMaterial({ map: ltex, transparent: true, side: THREE.DoubleSide });
    const lmesh = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.35), lmat);
    lmesh.position.set(lx, RL_Y, lz);
    lmesh.lookAt(0, RL_Y, 0);
    lmat.opacity = 0.4; // base visibility
    roomGroup.add(lmesh);

    roomLabels.push({ mesh: lmesh, index: i, prog: 0, text: labels[i] });
  }
}

// ─── BOTÓ VR ──────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
statusEl.textContent = 'Three.js carregat. Comprovant suport VR...';

if (navigator.xr) {
  let resolved = false;
  setTimeout(() => {
    if (!resolved) {
      statusEl.textContent = 'La comprovació VR triga massa. Prova de recarregar.';
      statusEl.style.color = '#fa0';
    }
  }, 5000);

  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    resolved = true;
    if (supported) {
      statusEl.textContent = 'Llest. Posa\'t les ulleres i prem el botó.';
      const btn = VRButton.createButton(renderer, {
        optionalFeatures: ['local-floor', 'bounded-floor']
      });
      document.body.appendChild(btn);
    } else {
      statusEl.textContent = 'VR immersiu no suportat. Obre per HTTPS amb el Meta Quest Browser.';
    }
  }).catch(err => {
    resolved = true;
    statusEl.textContent = 'Error VR: ' + err.message;
    statusEl.style.color = '#f66';
  });
} else {
  statusEl.textContent = 'WebXR no disponible. Fes servir el Meta Quest Browser.';
}

// ─── ESTAT ────────────────────────────────────────────────────────────
let state = 'hub';  // 'hub' | 'room'
const buttonStates = {};
const roomLabels = []; // labels inside a room
let roomWindow = null;  // currently opened floating window in room

// ─── DETECCIÓ DE QUIN CUB ES MIRA ─────────────────────────────────────
const _fwd = new THREE.Vector3();
const _cam = new THREE.Vector3();
const _to  = new THREE.Vector3();

function getLookedCube() {
  camera.getWorldDirection(_fwd);
  camera.getWorldPosition(_cam);
  let best = -1, bestDot = 0.72;
  for (let i = 0; i < cubes.length; i++) {
    _to.copy(cubes[i].mesh.position).sub(_cam).normalize();
    const d = _fwd.dot(_to);
    if (d > bestDot) { bestDot = d; best = i; }
  }
  return best;
}

function getLookedRoomLabel() {
  camera.getWorldDirection(_fwd);
  camera.getWorldPosition(_cam);
  let best = -1, bestDot = 0.7;
  for (let i = 0; i < roomLabels.length; i++) {
    _to.copy(roomLabels[i].mesh.position).sub(_cam).normalize();
    const d = _fwd.dot(_to);
    if (d > bestDot) { bestDot = d; best = i; }
  }
  return best;
}

function openLabelWindow(ridx) {
  // remove existing
  if (roomWindow) { roomGroup.remove(roomWindow); roomWindow.geometry?.dispose(); (Array.isArray(roomWindow.material)?roomWindow.material:[roomWindow.material]).forEach(m=>m.dispose()); roomWindow = null; }
  const info = roomLabels[ridx];
  const p = info.mesh.position.clone();
  // create canvas with same style
  const cw = 1024, ch = 512;
  const c = document.createElement('canvas'); c.width = cw; c.height = ch;
  const ctx = c.getContext('2d');
  function rrect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  ctx.clearRect(0,0,cw,ch); rrect(ctx,12,12,cw-24,ch-24,28); ctx.fillStyle='rgba(255,255,255,0.98)'; ctx.fill();
  ctx.fillStyle = '#111111'; ctx.font = 'bold 64px Arial'; ctx.textAlign='center'; ctx.fillText(info.text, cw/2, ch/2);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
  const geom = new THREE.PlaneGeometry(1.6, 0.8);
  const mesh = new THREE.Mesh(geom, mat);
  // position window slightly toward the camera so it appears in front of the label
  camera.getWorldPosition(_cam);
  const dir = _cam.clone().sub(p).normalize();
  const frontPos = p.clone().add(dir.multiplyScalar(0.6));
  mesh.position.copy(frontPos);
  mesh.lookAt(_cam.x, frontPos.y, _cam.z);
  roomGroup.add(mesh);
  roomWindow = mesh;
}

// ─── ENTRADA / SORTIDA DE SALA ─────────────────────────────────────────
function enterRoom(idx) {
  buildRoom(idx);
  hubGroup.visible = false;
  roomGroup.visible = true;
  state = 'room';
}

function exitRoom() {
  clearGroup(roomGroup);
  roomGroup.visible = false;
  hubGroup.visible = true;
  state = 'hub';
}

// ─── CONTROLADORS ─────────────────────────────────────────────────────
const infoEl = document.getElementById('controllerInfo');

function handleInput(frame) {
  const session = renderer.xr.getSession();
  if (!session) return;

  const refSpace = renderer.xr.getReferenceSpace();
  let infoText = 'Posició dels mandos:\n';
  let anyController = false;

  for (const src of session.inputSources) {
    if (!src.gamepad) continue;

    // Posició
    if (frame && refSpace) {
      const space = src.gripSpace || src.targetRaySpace;
      if (space) {
        const pose = frame.getPose(space, refSpace);
        if (pose) {
          anyController = true;
          const p = pose.transform.position;
          const hand = src.handedness === 'right' ? 'Dret    ' : 'Esquerre';
          infoText += `${hand}: x=${p.x.toFixed(2)}  y=${p.y.toFixed(2)}  z=${p.z.toFixed(2)}\n`;
        }
      }
    }

    // Botons (mando dret)
    if (src.handedness !== 'right') continue;
    const gp = src.gamepad;
    const aPressed = gp.buttons[4]?.pressed;
    const bPressed = gp.buttons[5]?.pressed;

    if (aPressed && !buttonStates.a) {
      if (state === 'hub') {
        const idx = getLookedCube();
        if (idx !== -1) enterRoom(idx);
      } else if (state === 'room') {
        // in-room: check looked room label
        const ridx = getLookedRoomLabel();
        if (ridx !== -1) {
          // open floating window at label
          openLabelWindow(ridx);
        }
      }
    }
    if (bPressed && !buttonStates.b) {
      if (state === 'room') {
        // if a floating window is open, close it first
        if (roomWindow) {
          roomGroup.remove(roomWindow);
          roomWindow.geometry?.dispose();
          (roomWindow.material && (Array.isArray(roomWindow.material)?roomWindow.material:[roomWindow.material])).forEach(m=>m.dispose());
          roomWindow = null;
        } else {
          exitRoom();
        }
      }
    }
    buttonStates.a = aPressed;
    buttonStates.b = bPressed;
  }

  infoEl.textContent = anyController ? infoText : 'Mandos: cap detectat';
}

// ─── LOOP D'ANIMACIÓ ──────────────────────────────────────────────────
const _camPos2D = new THREE.Vector3();

function animate(time, frame) {
  if (state === 'hub') {
    camera.getWorldPosition(_camPos2D);

    const looked = getLookedCube();

    for (let i = 0; i < cubes.length; i++) {
      const c = cubes[i];
      // Suau animació cap al focus
      const target = (i === looked) ? 1 : 0;
      c.prog += (target - c.prog) * 0.12;
      const s = 1 + (HOVER_SCALE - 1) * c.prog;
      c.mesh.scale.setScalar(s);
      const camPos3 = new THREE.Vector3(); camera.getWorldPosition(camPos3);
      c.mesh.lookAt(camPos3.x, camPos3.y - 0.25, camPos3.z);

      // Labels: apareixen quan l'element està enfocat; usem l'altura real de la imatge
      const bp = labelBottomPlanes[i];
      const geoH = (c.mesh.geometry && c.mesh.geometry.parameters && c.mesh.geometry.parameters.height) ? c.mesh.geometry.parameters.height : IMAGE_HEIGHT;
      const bottomBaseOffset = 0.12;
      const botY = IMAGE_Y - geoH / 2 - bottomBaseOffset;
      bp.position.y = botY;
      // keep text at same distance as the image
      const imgPos = c.mesh.position.clone();
      bp.position.x = imgPos.x;
      bp.position.z = imgPos.z;
      const base = 0.25; // visible even when not focused
      const vis = base + (1 - base) * c.prog;
      bp.material.opacity = vis;
      bp.lookAt(_camPos2D.x, bp.position.y, _camPos2D.z);
      bp.rotateX(-0.12);
    }
  }
  else if (state === 'room') {
    // animate room labels
    camera.getWorldPosition(_camPos2D);
    const looked = getLookedRoomLabel();
    for (let i = 0; i < roomLabels.length; i++) {
      const r = roomLabels[i];
      const target = (i === looked) ? 1 : 0;
      r.prog += (target - r.prog) * 0.12;
      const s = 1 + 0.25 * r.prog;
      r.mesh.scale.setScalar(s);
      const base = 0.4;
      const vis = base + (1 - base) * r.prog;
      r.mesh.material.opacity = vis;
      r.mesh.lookAt(_camPos2D.x, r.mesh.position.y, _camPos2D.z);
    }
  }

  handleInput(frame);
  renderer.render(scene, camera);
}

renderer.setAnimationLoop((time, frame) => {
  animate(time, frame);
});


window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
