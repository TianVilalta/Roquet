<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>VR Mans amb càmera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    #video {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 200px;
      border: 2px solid white;
      z-index: 999;
    }
  </style>
</head>

<body>
  <!-- Vídeo visible per comprovar que funciona -->
  <video id="video" playsinline></video>

  <!-- Escena VR -->
  <a-scene vr-mode-ui="enabled: true">
    <a-entity camera look-controls wasd-controls></a-entity>

    <a-sky color="#222233"></a-sky>
    <a-plane rotation="-90 0 0" width="30" height="30" color="#444"></a-plane>

    <!-- Contenidor de punts de la mà -->
    <a-entity id="handPoints"></a-entity>
  </a-scene>

  <script>
    const video = document.getElementById('video');
    const handPoints = document.getElementById('handPoints');

    // Crear 21 punts 3D per la mà
    const points = [];
    for (let i = 0; i < 21; i++) {
      const p = document.createElement('a-sphere');
      p.setAttribute('radius', '0.03');
      p.setAttribute('color', 'yellow');
      handPoints.appendChild(p);
      points.push(p);
    }

    // Configurar MediaPipe Hands
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults(results => {
      if (!results.multiHandLandmarks.length) return;

      const lm = results.multiHandLandmarks[0];

      lm.forEach((pt, i) => {
        // Convertir coordenades 0..1 a espai 3D
        const x = (pt.x - 0.5) * -4;
        const y = (0.5 - pt.y) * 3;
        const z = -3 + pt.z * 2;

        points[i].setAttribute('position', `${x} ${y} ${z}`);
      });
    });

    // Activar càmera
    const camera = new Camera(video, {
      onFrame: async () => {
        await hands.send({image: video});
      },
      width: 640,
      height: 480
    });

    camera.start();
  </script>
</body>
</html>
