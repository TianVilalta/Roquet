<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>VR Controller Debug</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene
    xr-mode-ui="enabled: true"
    webxr="optionalFeatures: local-floor, bounded-floor">

    <!-- Càmera -->
    <a-entity id="cam" camera look-controls position="0 1.6 0"></a-entity>

    <a-sky color="#222233"></a-sky>

    <!-- Mandos -->
    <a-entity id="rightController" oculus-touch-controls="hand: right"></a-entity>
    <a-entity id="leftController"  oculus-touch-controls="hand: left"></a-entity>

    <!-- Text 3D visible en VR -->
    <a-entity id="debugText"
              text="value: Carregant...; color: yellow; width: 3"
              position="0 1.2 -1.5">
    </a-entity>

  </a-scene>

  <script>
    const debugText = document.getElementById('debugText');
    const scene = document.querySelector('a-scene');

    scene.renderer.xr.addEventListener('sessionstart', () => {
      const session = scene.renderer.xr.getSession();

      function loop() {
        let output = "";

        for (const input of session.inputSources) {
          if (!input.gamepad) continue;

          output += `Mando: ${input.handedness}\n`;

          // Botons
          input.gamepad.buttons.forEach((btn, i) => {
            if (btn.pressed) {
              output += `Botó ${i}: PREMUT\n`;
            }
          });

          // Joystick
          if (input.gamepad.axes.length >= 4) {
            output += `Stick X: ${input.gamepad.axes[2].toFixed(3)}\n`;
            output += `Stick Y: ${input.gamepad.axes[3].toFixed(3)}\n`;
          }

          output += "\n";
        }

        debugText.setAttribute("text", "value: " + (output || "No hi ha mandos detectats"));

        requestAnimationFrame(loop);
      }

      loop();
    });
  </script>
</body>
</html>
