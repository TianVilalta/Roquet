<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene
      xr-mode-ui="enabled: true"
      webxr="optionalFeatures: local-floor, bounded-floor, hand-tracking, layers">

      <a-entity camera look-controls></a-entity>

      <a-sky color="#222233"></a-sky>

      <!-- Cub que mostra on apunta el mando -->
      <a-box id="aimCube"
             color="yellow"
             depth="0.2" height="0.2" width="0.2"
             position="0 1 -3">
      </a-box>

      <!-- Mando esquerre -->
      <a-entity id="leftController"
                laser-controls="hand: left">
      </a-entity>

      <!-- Mando dret -->
      <a-entity id="rightController"
                laser-controls="hand: right">
      </a-entity>

    </a-scene>

    <script>
      const aimCube = document.getElementById('aimCube');
      const scene = document.querySelector('a-scene');

      scene.addEventListener('loaded', () => {
        const left = document.getElementById('leftController');
        const right = document.getElementById('rightController');

        function updateAim() {
          // Agafem el mando dret (si existeix)
          const ctrl = right.object3D;

          if (ctrl) {
            // Posició del mando
            const pos = new THREE.Vector3();
            ctrl.getWorldPosition(pos);

            // Direcció del mando
            const dir = new THREE.Vector3();
            ctrl.getWorldDirection(dir);

            // Punt on apunta (3 metres endavant)
            const aimPos = pos.clone().add(dir.multiplyScalar(-3));

            aimCube.setAttribute('position', `${aimPos.x} ${aimPos.y} ${aimPos.z}`);
          }

          requestAnimationFrame(updateAim);
        }

        updateAim();
      });
    </script>
  </body>
</html>
