<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>Botó A Meta Quest 3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    #msg {
      position: fixed;
      top: 30%;
      width: 100%;
      text-align: center;
      font-size: 80px;
      font-weight: bold;
      color: yellow;
      text-shadow: 0 0 20px black;
      z-index: 999;
    }
  </style>
</head>

<body>
  <div id="msg"></div>

  <a-scene
    xr-mode-ui="enabled: true"
    webxr="optionalFeatures: local-floor, bounded-floor">

    <a-entity camera look-controls></a-entity>
    <a-sky color="#222233"></a-sky>

    <!-- Mando dret -->
    <a-entity id="rightController"
              oculus-touch-controls="hand: right"
              raycaster="objects: .clickable"
              line="color: cyan; opacity: 1">
    </a-entity>

    <!-- Mando esquerre -->
    <a-entity id="leftController"
              oculus-touch-controls="hand: left"
              raycaster="objects: .clickable"
              line="color: cyan; opacity: 1">
    </a-entity>

    <!-- Botó VR clicable -->
    <a-box class="clickable"
           id="vrButton"
           position="0 1.5 -2"
           depth="0.3" height="0.3" width="1"
           color="orange"
           text="value: Clica amb el laser; align: center; color: black; width: 4">
    </a-box>

  </a-scene>

  <script>
    const msg = document.getElementById('msg');

    // Quan es clica el botó VR amb el laser
    document.getElementById('vrButton').addEventListener('click', () => {
      msg.textContent = "Hola";
    });

    // Detectar botó A del mando dret
    const scene = document.querySelector('a-scene');

    scene.renderer.xr.addEventListener('sessionstart', () => {
      const session = scene.renderer.xr.getSession();

      function update() {
        for (const input of session.inputSources) {
          if (input.gamepad && input.handedness === "right") {
            // Botó A = gamepad.buttons[4] en Quest 3
            const buttonA = input.gamepad.buttons[4];

            if (buttonA && buttonA.pressed) {
              msg.textContent = "Hola";
            }
          }
        }
        requestAnimationFrame(update);
      }

      update();
    });
  </script>
</body>
</html>
