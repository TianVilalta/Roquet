<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>VR Botó Hola</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    #msg {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 999;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 20px;
    }
  </style>
</head>

<body>
  <div id="msg"></div>

  <a-scene
    xr-mode-ui="enabled: true"
    webxr="optionalFeatures: local-floor, bounded-floor">

    <a-entity camera look-controls></a-entity>
    <a-sky color="#222233"></a-sky>

    <!-- Botó VR -->
    <a-box id="vrButton"
           position="0 1.5 -2"
           depth="0.3" height="0.3" width="1"
           color="orange"
           text="value: Clica aquí; align: center; color: black; width: 4">
    </a-box>

    <!-- Mando dret -->
    <a-entity id="rightController"
              raycaster="objects: #vrButton"
              line="color: cyan; opacity: 1"
              oculus-touch-controls="hand: right">
    </a-entity>

    <!-- Mando esquerre -->
    <a-entity id="leftController"
              raycaster="objects: #vrButton"
              line="color: cyan; opacity: 1"
              oculus-touch-controls="hand: left">
    </a-entity>

  </a-scene>

  <script>
    const msg = document.getElementById('msg');
    const vrButton = document.getElementById('vrButton');

    vrButton.addEventListener('click', () => {
      msg.textContent = "Hola";
    });
  </script>
</body>
</html>
