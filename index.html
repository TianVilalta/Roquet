<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <title>Touch Teleport Cube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene xr-mode-ui="enabled: true">

    <!-- Càmera (persona) -->
    <a-entity camera look-controls position="0 1.6 0"></a-entity>

    <a-sky color="#222233"></a-sky>

    <!-- Cub molt a prop de la persona -->
    <a-box id="cube"
           position="0 1.4 -0.8"
           depth="0.3" height="0.3" width="0.3"
           color="orange">
    </a-box>

    <!-- Mandos -->
    <a-entity id="rightController" oculus-touch-controls="hand: right"></a-entity>
    <a-entity id="leftController"  oculus-touch-controls="hand: left"></a-entity>

  </a-scene>

  <script>
    const cube = document.getElementById('cube');
    const right = document.getElementById('rightController');
    const left  = document.getElementById('leftController');
    const scene = document.querySelector('a-scene');

    // Mou el cub a una posició nova
    function teleportCube() {
      const x = (Math.random() - 0.5) * 1.5;   // molt a prop
      const y = 1.2 + Math.random() * 0.6;     // al voltant del pit
      const z = -0.6 - Math.random() * 1.0;    // davant la persona
      cube.setAttribute('position', `${x} ${y} ${z}`);
    }

    scene.addEventListener('loaded', () => {
      function loop() {
        const cubePos = new THREE.Vector3();
        cube.object3D.getWorldPosition(cubePos);

        const rPos = new THREE.Vector3();
        right.object3D.getWorldPosition(rPos);

        const lPos = new THREE.Vector3();
        left.object3D.getWorldPosition(lPos);

        const distR = cubePos.distanceTo(rPos);
        const distL = cubePos.distanceTo(lPos);

        // Si qualsevol mando entra dins el radi del cub → teleporta
        if (distR < 0.25 || distL < 0.25) {
          teleportCube();
        }

        requestAnimationFrame(loop);
      }

      loop();
    });
  </script>
</body>
</html>
